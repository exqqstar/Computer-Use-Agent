[green_agent]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/green_car_bench_agent/server.py --host 127.0.0.1 --port 8081"

[[participants]]
role = "agent"
endpoint = "http://127.0.0.1:8080"
cmd = "python src/purple_car_bench_agent/server.py --host 127.0.0.1 --port 8080 --agent-llm openai/MiniMax-M2.7 --temperature 0.0"

[config]
num_trials = 1
task_split = "test"  # "train" or "test"
# Green agent internal models (user simulator + policy evaluator) — all MiniMax
user_model = "openai/MiniMax-M2.7"
user_provider = "openai"
user_thinking = false
policy_evaluator_model = "openai/MiniMax-M2.7"
policy_evaluator_provider = "openai"
# Specify number of tasks to run (first N tasks) or use task_id_filter for specific tasks
tasks_base_num_tasks = 3 # First N tasks in type/split, -1 for all.
tasks_hallucination_num_tasks = 1 # First N tasks in type/split, -1 for all.
tasks_disambiguation_num_tasks = 1 # First N tasks in type/split, -1 for all.
# Alternative: Run specific task IDs, priority over num_tasks. Have to be in the correct type/split (check task_split.json)
# tasks_base_task_id_filter = ["base_0", "base_2"]
# tasks_hallucination_task_id_filter = ["hallucination_0"]
# tasks_disambiguation_task_id_filter = ["disambiguation_0"]
max_steps = 50
